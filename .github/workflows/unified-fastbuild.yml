name: 统一加速构建 欧加真OKI内核

env:
  TZ: Asia/Shanghai
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      build_6_1_118:
        description: '构建 6.1.118'
        required: true
        type: boolean
        default: true

      ksu_type:
        description: 'KernelSU分支(ReSukiSU/SukiSU Ultra/KernelSU Next/KSU(原版)/无内置KSU)'
        required: true
        type: choice
        default: 'resukisu'
        options:
          - 'resukisu'
          - 'sukisu'
          - 'ksunext'
          - 'ksu'
          - 'none'

      susfs_enable:
        description: '是否开启susfs'
        required: true
        type: boolean
        default: true

      kpm_enable:
        description: '是否开启kpm'
        required: true
        type: choice
        default: 'false'
        options:
          - 'false'
          - 'builtin'
          - 'kpn'

      lz4_enable:
        description: '是否安装 lz4 1.10.0+zstd 1.5.7 补丁'
        required: true
        type: boolean
        default: true

      lz4kd_enable:
        description: '是否安装 LZ4KD 补丁'
        required: true
        type: boolean
        default: false

      bbr_enable:
        description: '是否启用bbr算法'
        required: true
        type: choice
        default: 'false'
        options:
          - 'false'
          - 'true'
          - 'default'

      better_net:
        description: '是否开启网络功能拓展配置'
        required: true
        type: boolean
        default: false

      ssg_enable:
        description: '是否启用三星SSG IO调度器支持'
        required: true
        type: boolean
        default: true

      rekernel_enable:
        description: '是否启用Re-Kernel支持'
        required: true
        type: boolean
        default: false

      baseband_guard:
        description: '是否开启内核级基带保护'
        required: true
        type: boolean
        default: true

      ccache_update:
        description: '更新ccache缓存'
        required: true
        type: boolean
        default: false

      ccache_debug:
        description: '是否上传 Ccache调试日志'
        required: true
        type: boolean
        default: false

      kernel_suffix:
        description: '内核后缀'
        required: false
        type: string
        default: ''

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set_matrix.outputs.matrix }}
    steps:
      - name: 检查输入并生成矩阵
        id: set_matrix
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ inputs.lz4_enable }}" == "true" && "${{ inputs.lz4kd_enable }}" == "true" ]]; then
            echo "lz4_enable 与 lz4kd_enable 不能同时开启"
            exit 1
          fi

          versions=()

          if [[ "${{ inputs.build_6_1_118 }}" == "true" ]]; then
            versions+=('"6.1.118"')
          fi

          if [[ ${#versions[@]} -eq 0 ]]; then
            echo "至少选择一个构建版本"
            exit 1
          fi

          matrix_json=$(printf '%s\n' "${versions[@]}" | jq -cs '{kernel_version: .}')
          echo "matrix=$matrix_json" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    outputs:
      ak3name_6_1_118: ${{ steps.pack.outputs.ak3name }}
      ksuver_6_1_118: ${{ steps.ksu_meta.outputs.ksuver }}
      fullver_6_1_118: ${{ steps.meta.outputs.fullver }}
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 加载版本映射
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          source scripts/version_map.sh
          load_version_map "${{ matrix.kernel_version }}"

          echo "KERNEL_VERSION=$KERNEL_VERSION" >> "$GITHUB_ENV"
          echo "KERNEL_SUBVERSION=$KERNEL_SUBVERSION" >> "$GITHUB_ENV"
          echo "KERNEL_PLATFORM=$KERNEL_PLATFORM" >> "$GITHUB_ENV"
          echo "ANDROID_VERSION=$ANDROID_VERSION" >> "$GITHUB_ENV"
          echo "KERNEL_NAME=$KERNEL_NAME" >> "$GITHUB_ENV"
          echo "SOURCE_ZIP=$SOURCE_ZIP" >> "$GITHUB_ENV"
          echo "SOURCE_DIR_NAME=$SOURCE_DIR_NAME" >> "$GITHUB_ENV"
          echo "SOURCE_OUT_DIR=$SOURCE_OUT_DIR" >> "$GITHUB_ENV"
          echo "DEFCONFIG=$DEFCONFIG" >> "$GITHUB_ENV"
          echo "BUILD_TARGET=$BUILD_TARGET" >> "$GITHUB_ENV"
          echo "IMAGE_PATH=$IMAGE_PATH" >> "$GITHUB_ENV"
          echo "DTB_PATH=$DTB_PATH" >> "$GITHUB_ENV"
          echo "DTBO_PATH=$DTBO_PATH" >> "$GITHUB_ENV"
          echo "ANYKERNEL_REPO=$ANYKERNEL_REPO" >> "$GITHUB_ENV"
          echo "ANYKERNEL_BRANCH=$ANYKERNEL_BRANCH" >> "$GITHUB_ENV"
          echo "CCACHE_KEY_PREFIX=$CCACHE_KEY_PREFIX" >> "$GITHUB_ENV"
          echo "RELEASE_TAG_PREFIX=$RELEASE_TAG_PREFIX" >> "$GITHUB_ENV"
          echo "RELEASE_NAME_PREFIX=$RELEASE_NAME_PREFIX" >> "$GITHUB_ENV"
          echo "CLANG_URL=$CLANG_URL" >> "$GITHUB_ENV"
          echo "BUILD_TOOLS_URL=$BUILD_TOOLS_URL" >> "$GITHUB_ENV"

          kernel_main="${KERNEL_VERSION%.*}"
          echo "KERNEL_MAIN=$kernel_main" >> "$GITHUB_ENV"

          if [[ -n "${{ inputs.kernel_suffix }}" ]]; then
            fullver="${KERNEL_VERSION}-${{ inputs.kernel_suffix }}"
          else
            fullver="${KERNEL_VERSION}-${KERNEL_NAME}"
          fi
          echo "fullver=$fullver" >> "$GITHUB_OUTPUT"
          echo "FULL_VERSION=$fullver" >> "$GITHUB_ENV"

      - name: 导出输入环境变量
        shell: bash
        run: |
          echo "INPUT_SUSFS_ENABLE=${{ inputs.susfs_enable }}" >> "$GITHUB_ENV"
          echo "INPUT_KPM_ENABLE=${{ inputs.kpm_enable }}" >> "$GITHUB_ENV"
          echo "INPUT_LZ4_ENABLE=${{ inputs.lz4_enable }}" >> "$GITHUB_ENV"
          echo "INPUT_LZ4KD_ENABLE=${{ inputs.lz4kd_enable }}" >> "$GITHUB_ENV"
          echo "INPUT_BETTER_NET=${{ inputs.better_net }}" >> "$GITHUB_ENV"
          echo "INPUT_BBR_ENABLE=${{ inputs.bbr_enable }}" >> "$GITHUB_ENV"
          echo "INPUT_SSG_ENABLE=${{ inputs.ssg_enable }}" >> "$GITHUB_ENV"
          echo "INPUT_REKERNEL_ENABLE=${{ inputs.rekernel_enable }}" >> "$GITHUB_ENV"
          echo "INPUT_BASEBAND_GUARD=${{ inputs.baseband_guard }}" >> "$GITHUB_ENV"

      - name: 安装环境依赖
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-mark hold firefox || true
          sudo apt-mark hold libc-bin || true
          sudo apt purge -y man-db || true
          sudo rm -rf /var/lib/man-db/auto-update || true
          sudo apt update
          sudo apt-get install -y --no-install-recommends \
            binutils python-is-python3 libssl-dev libelf-dev ccache jq aria2 unzip zip wget curl patch gh zstd

      - name: 初始化工作目录与源码工具链
        shell: bash
        run: |
          set -euo pipefail
          rm -rf kernel_workspace
          mkdir -p kernel_workspace
          cd kernel_workspace

          echo "当前仓库：$GITHUB_REPOSITORY"
          echo "当前分支：$GITHUB_REF_NAME"

          aria2c -s16 -x16 -k1M "$SOURCE_ZIP" -o common.zip
          unzip -q common.zip
          mv "$SOURCE_DIR_NAME" common
          rm -f common.zip

          mkdir -p clang20
          aria2c -s16 -x16 -k1M "$CLANG_URL" -o clang.zip
          unzip -q clang.zip -d clang20
          rm -f clang.zip

          aria2c -s16 -x16 -k1M "$BUILD_TOOLS_URL" -o build-tools.zip
          unzip -q build-tools.zip
          rm -f build-tools.zip

      - name: 清理源码并处理 dirty 标记
        shell: bash
        run: |
          set -euo pipefail
          source scripts/patches.sh
          apply_dirty_cleanup "$GITHUB_WORKSPACE/kernel_workspace/common"

      - name: 配置 ccache
        shell: bash
        run: |
          set -euo pipefail
          echo "CCACHE_DIR=$HOME/.ccache_${KERNEL_MAIN}.${KERNEL_SUBVERSION}" >> "$GITHUB_ENV"
          echo "CCACHE_MAXSIZE=3G" >> "$GITHUB_ENV"
          df -h

      - name: 载入当前版本内核的 ccache缓存
        uses: actions/cache@v4
        id: ccache_restore
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ env.CCACHE_KEY_PREFIX }}-${{ runner.os }}-${{ github.ref_name }}
          restore-keys: |
            ${{ env.CCACHE_KEY_PREFIX }}-${{ runner.os }}-
            ${{ env.CCACHE_KEY_PREFIX }}-

      - name: 拉取公共预置 ccache 缓存
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -d "${CCACHE_DIR}" ] && [ "$(ls -A "${CCACHE_DIR}" 2>/dev/null)" ]; then
            echo "检测到本地已成功载入 ccache 缓存，跳过公共 ccache 拉取"
            exit 0
          fi

          mkdir -p "${CCACHE_DIR}"
          FILE_NAME="ccache-${KERNEL_MAIN}.${KERNEL_SUBVERSION}.tar.zst"

          if gh release download -p "$FILE_NAME" -R cctv18/public_ccache; then
            tar -I zstd -xf "$FILE_NAME" -C "${CCACHE_DIR}"
            echo "公共 ccache 恢复完成"
          else
            echo "公共 ccache 中未找到对应文件，将进行全量编译"
          fi

      - name: 清除旧 ccache 缓存
        if: inputs.ccache_update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh cache delete "${CCACHE_KEY_PREFIX}-${{ runner.os }}-${{ github.ref_name }}" -R "${{ github.repository }}" || true

      - name: 初始化 ccache
        shell: bash
        run: |
          set -euo pipefail
          export CCACHE_COMPILERCHECK="none"
          export CCACHE_BASEDIR="${{ github.workspace }}"
          export CCACHE_NOHASHDIR="true"
          export CCACHE_HARDLINK="true"
          export CCACHE_DIR="${CCACHE_DIR}"
          export CCACHE_MAXSIZE="${CCACHE_MAXSIZE}"

          mkdir -p "$CCACHE_DIR"
          ccache -M "$CCACHE_MAXSIZE"
          ccache -o compression=true
          ccache -s

          if [[ "${{ steps.ccache_restore.outputs.cache-hit }}" == "true" ]]; then
            ccache -sv
          fi

      - name: 应用 KernelSU
        shell: bash
        run: |
          set -euo pipefail
          source scripts/patches.sh
          DEFCONFIG_PATH="$GITHUB_WORKSPACE/kernel_workspace/common/arch/arm64/configs/$DEFCONFIG"
          apply_ksu_branch "$GITHUB_WORKSPACE/kernel_workspace" "${{ inputs.ksu_type }}" "$DEFCONFIG_PATH"

      - name: 应用 susfs 补丁
        if: inputs.susfs_enable
        shell: bash
        run: |
          set -euo pipefail
          source scripts/patches.sh
          apply_susfs "$GITHUB_WORKSPACE/kernel_workspace" "$ANDROID_VERSION" "$KERNEL_MAIN" "${{ inputs.ksu_type }}"

      - name: 应用 lz4 + zstd 补丁
        if: inputs.lz4_enable
        shell: bash
        run: |
          set -euo pipefail
          source scripts/patches.sh
          apply_lz4_zstd_patch "$GITHUB_WORKSPACE/kernel_workspace"

      - name: 应用 lz4kd 补丁
        if: inputs.lz4kd_enable
        shell: bash
        run: |
          set -euo pipefail
          source scripts/patches.sh
          apply_lz4kd_patch "$GITHUB_WORKSPACE/kernel_workspace" "$KERNEL_MAIN"

      - name: 应用 defconfig 配置
        shell: bash
        run: |
          set -euo pipefail
          source scripts/patches.sh

          DEFCONFIG_PATH="$GITHUB_WORKSPACE/kernel_workspace/common/arch/arm64/configs/$DEFCONFIG"

          if [[ "${{ inputs.susfs_enable }}" == "true" ]]; then
            apply_susfs_configs "$DEFCONFIG_PATH"
          fi

          apply_base_configs "$DEFCONFIG_PATH" "${{ inputs.ksu_type }}" "${{ inputs.kpm_enable }}" "${{ inputs.susfs_enable }}" "${{ inputs.lz4kd_enable }}"

          if [[ "${{ inputs.better_net }}" == "true" ]]; then
            apply_better_net "$GITHUB_WORKSPACE/kernel_workspace" "$DEFCONFIG_PATH"
          fi

          apply_bbr_configs "$DEFCONFIG_PATH" "${{ inputs.bbr_enable }}"

          if [[ "${{ inputs.ssg_enable }}" == "true" ]]; then
            apply_ssg_configs "$DEFCONFIG_PATH"
          fi

          if [[ "${{ inputs.rekernel_enable }}" == "true" ]]; then
            apply_rekernel_configs "$DEFCONFIG_PATH"
          fi

          if [[ "${{ inputs.baseband_guard }}" == "true" ]]; then
            apply_baseband_guard "$GITHUB_WORKSPACE/kernel_workspace" "$DEFCONFIG_PATH"
          fi

          post_patch_build_config "$GITHUB_WORKSPACE/kernel_workspace"

      - name: 写入制作名称后缀
        shell: bash
        run: |
          set -euo pipefail
          source scripts/patches.sh

          if [[ -n "${{ inputs.kernel_suffix }}" ]]; then
            suffix="${{ inputs.kernel_suffix }}"
          else
            suffix="$KERNEL_NAME"
          fi

          apply_kernel_name_suffix "$GITHUB_WORKSPACE/kernel_workspace/common" "$suffix"

      - name: 准备 faketime wrapper
        shell: bash
        run: |
          set -euo pipefail
          source scripts/patches.sh
          prepare_faketime_wrappers "$GITHUB_WORKSPACE/kernel_workspace/common"

      - name: 构建内核
        shell: bash
        run: |
          set -euo pipefail

          WORKDIR="$(pwd)"
          export PATH="/usr/lib/ccache:$PATH"
          export PATH="$WORKDIR/kernel_workspace/clang20/bin:$PATH"
          export PATH="$WORKDIR/kernel_workspace/build-tools/bin:$PATH"

          CLANG_DIR="$WORKDIR/kernel_workspace/clang20/bin"
          echo "Clang版本: $($CLANG_DIR/clang --version | head -n 1)"
          echo "LLD版本: $($CLANG_DIR/ld.lld --version | head -n 1)"

          export CCACHE_LOGFILE="${{ github.workspace }}/kernel_workspace/ccache.log"
          export CCACHE_COMPILERCHECK="none"
          export CCACHE_BASEDIR="${{ github.workspace }}"
          export CCACHE_NOHASHDIR="true"
          export CCACHE_HARDLINK="true"
          export CCACHE_DIR="${CCACHE_DIR}"
          export CCACHE_MAXSIZE="3G"

          mkdir -p "$CCACHE_DIR"
          echo "sloppiness = file_stat_matches,include_file_ctime,include_file_mtime,pch_defines,file_macro,time_macros" >> "$CCACHE_DIR/ccache.conf"

          cd kernel_workspace/common

          sudo rm -rf /usr/share/dotnet &
          sudo rm -rf /usr/local/lib/android &
          sudo rm -rf /opt/ghc &
          sudo rm -rf /opt/hostedtoolcache/CodeQL &
          wait

          make -j"$(nproc --all)" \
            LLVM=1 \
            ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC="ccache clang" \
            LD="ld.lld" \
            HOSTLD=ld.lld \
            O=out \
            KCFLAGS+=-O2 \
            KCFLAGS+=-Wno-error \
            "$DEFCONFIG"

          make -j"$(nproc --all)" \
            LLVM=1 \
            ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC="$(pwd)/cc-wrapper" \
            LD="$(pwd)/ld-wrapper" \
            HOSTLD=ld.lld \
            O=out \
            KCFLAGS+=-O2 \
            KCFLAGS+=-Wno-error \
            "$BUILD_TARGET"

          echo "内核编译完成"
          ccache -s
          df -h

      - name: 保存新的 ccache 缓存
        if: inputs.ccache_update || steps.ccache_restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ env.CCACHE_KEY_PREFIX }}-${{ runner.os }}-${{ github.ref_name }}

      - name: 应用 KPM 后处理
        shell: bash
        run: |
          set -euo pipefail
          source scripts/patches.sh
          apply_kpm_post_build "$GITHUB_WORKSPACE/kernel_workspace/common/out/arch/arm64/boot" "${{ inputs.kpm_enable }}" "${{ inputs.ksu_type }}"

      - name: 记录 KSU 输出版本
        id: ksu_meta
        shell: bash
        run: |
          set -euo pipefail
          echo "ksuver=${KSU_VERSION_OUTPUT:-0}" >> "$GITHUB_OUTPUT"
          echo "KSUVER=${KSU_VERSION_OUTPUT:-0}" >> "$GITHUB_ENV"

      - name: AnyKernel3 打包
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          source scripts/common.sh

          ak3_name="$(pack_anykernel \
            "$GITHUB_WORKSPACE/kernel_workspace" \
            "$ANYKERNEL_REPO" \
            "$IMAGE_PATH" \
            "${{ inputs.ksu_type }}" \
            "${KSU_VERSION_OUTPUT:-0}" \
            "$KERNEL_MAIN" \
            "$KERNEL_SUBVERSION" \
            "$KERNEL_NAME" \
            "${{ inputs.kernel_suffix }}" \
            "${{ inputs.lz4kd_enable }}" \
            "${{ inputs.kpm_enable }}")"

          echo "ak3name=$ak3_name" >> "$GITHUB_OUTPUT"

      - name: 上传 Ccache 调试日志
        if: always() && inputs.ccache_debug
        uses: actions/upload-artifact@v4
        with:
          name: ccache-debug-log-${{ matrix.kernel_version }}
          path: ${{ github.workspace }}/kernel_workspace/ccache.log
          if-no-files-found: ignore

      - name: 上传 ZIP 工件
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pack.outputs.ak3name }}
          path: ${{ github.workspace }}/kernel_workspace/${{ steps.pack.outputs.ak3name }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      actions: read
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 下载 ZIP 工件
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.ak3name_6_1_118 }}
          path: ./release_zips

      - name: 准备发布文案
        shell: bash
        run: |
          set -euo pipefail
          source scripts/common.sh
          source scripts/release.sh
          source scripts/version_map.sh

          load_version_map "6.1.118"
          kernel_main="${KERNEL_VERSION%.*}"

          export INPUT_SUSFS_ENABLE="${{ inputs.susfs_enable }}"
          export INPUT_KPM_ENABLE="${{ inputs.kpm_enable }}"
          export INPUT_LZ4_ENABLE="${{ inputs.lz4_enable }}"
          export INPUT_LZ4KD_ENABLE="${{ inputs.lz4kd_enable }}"
          export INPUT_BETTER_NET="${{ inputs.better_net }}"
          export INPUT_BBR_ENABLE="${{ inputs.bbr_enable }}"
          export INPUT_SSG_ENABLE="${{ inputs.ssg_enable }}"
          export INPUT_REKERNEL_ENABLE="${{ inputs.rekernel_enable }}"
          export INPUT_BASEBAND_GUARD="${{ inputs.baseband_guard }}"

          if [[ -n "${{ inputs.kernel_suffix }}" ]]; then
            FULL_VERSION="${KERNEL_VERSION}-${{ inputs.kernel_suffix }}"
          else
            FULL_VERSION="${KERNEL_VERSION}-${KERNEL_NAME}"
          fi

          TIME="$(TZ='Asia/Shanghai' date +'%y%m%d%H%M%S')"
          TIME_FORM="$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"
          TAG_HEAD="$RELEASE_TAG_PREFIX"
          KSU_TYPENAME="$(resolve_ksu_typename_full "${{ inputs.ksu_type }}")"

          echo "FULL_VERSION=$FULL_VERSION" >> "$GITHUB_ENV"
          echo "TIME=$TIME" >> "$GITHUB_ENV"
          echo "TIME_FORM=$TIME_FORM" >> "$GITHUB_ENV"
          echo "TAG_HEAD=$TAG_HEAD" >> "$GITHUB_ENV"
          echo "KSU_TYPENAME=$KSU_TYPENAME" >> "$GITHUB_ENV"

          generate_release_body \
            "release_body.md" \
            "$FULL_VERSION" \
            "$TIME_FORM" \
            "$kernel_main" \
            "$KERNEL_SUBVERSION" \
            "$KSU_TYPENAME" \
            "${{ needs.build.outputs.ksuver_6_1_118 }}"

      - name: 创建发布
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ env.TAG_HEAD }}-${{ env.TIME }}"
          name: "${{ env.TAG_HEAD }}-${{ env.FULL_VERSION }}"
          body_path: release_body.md
          draft: false
          prerelease: false
          files: |
            release_zips/*.zip
